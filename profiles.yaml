# 默认值 — 所有 profile 继承这些设置
defaults:
  provider: openrouter
  model: gpt-5
  consumers: 20
  sampling_rate: 1.0
  sampling_seed: 42
  temp: 0.0
  top_p: 1.0
  max_tokens: 2048
  tunnel: ssh
  image_types: [SD]

# ---- 常用 profile ----

# OpenRouter 直接调用（最简模式）
direct:
  mode: direct

# Qwen 235B via OpenRouter + Alibaba
qwen235b:
  mode: direct
  model: "qwen/qwen3-vl-235b-a22b-instruct"
  openrouter_provider: alibaba

# CoMT-VSP 标准模式（SSH tunnel，vision tools 走 SSH）
comt_vsp:
  mode: comt_vsp
  model: "qwen/qwen3-vl-235b-a22b-instruct"
  openrouter_provider: alibaba
  comt_sample_id: "deletion-0107"
  consumers: 20
  sampling_rate: 0.12

# CoMT-VSP + Cloudflare Tunnel（vision tools 走 CF，LLM 仍走 OpenRouter）
comt_vsp_cf:
  _inherit: comt_vsp
  tunnel: cf

# CoMT-VSP + prebaked 后处理（ASK fallback）
comt_vsp_prebaked_ask:
  _inherit: comt_vsp
  vsp_postproc: true
  vsp_postproc_backend: prebaked
  vsp_postproc_fallback: ask
  vsp_postproc_method: visual_mask

# CoMT-VSP + prebaked 后处理（SD fallback - good）
comt_vsp_prebaked_sd_good:
  _inherit: comt_vsp
  vsp_postproc: true
  vsp_postproc_backend: prebaked
  vsp_postproc_fallback: sd
  vsp_postproc_method: good
  vsp_postproc_sd_prompt: "remove the boxed objects"

# CoMT-VSP + prebaked 后处理（SD fallback - bad）
comt_vsp_prebaked_sd_bad:
  _inherit: comt_vsp
  vsp_postproc: true
  vsp_postproc_backend: prebaked
  vsp_postproc_fallback: sd
  vsp_postproc_method: bad
  vsp_postproc_sd_prompt: "remove the boxed objects"

# 自部署 Qwen（AutoDL，通过 CF tunnel 访问）
autodl_qwen:
  mode: direct
  provider: self
  model: "Qwen3-VL-8B"
  llm_base_url: "https://llm.yuantian.me/v1"
  tunnel: cf
  consumers: 5

# 自部署 Qwen + CoMT-VSP（全部走 CF tunnel）
autodl_comt_vsp:
  mode: comt_vsp
  provider: self
  model: "Qwen3-VL-8B"
  llm_base_url: "https://llm.yuantian.me/v1"
  tunnel: cf
  comt_sample_id: "deletion-0107"
  consumers: 3
  sampling_rate: 0.12
